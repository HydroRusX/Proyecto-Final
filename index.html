<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Documentos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#ffffff;
}

/* HEADER */

header{
    background:#ffffff;
    border-bottom:2px solid #2f9cff;
    height:65px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    position:relative;
}
/*logo de clinicas*/
.logo img{
    height:60px;
}

/* BOTÓN MENU */

.menu{
    font-size:40px;
    cursor:pointer;
    position:relative;
}

/* Menu de navegacion */

.dropdown{
    position:absolute;
    top:65px;          /* Abajo del header */
    right:10px;        /* alineado con las tres rayitas */
    width:220px;
    background:#0f172a;
    color:white;
    border-radius:8px;
    overflow:hidden;
    display:none;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    z-index:100;
}

.dropdown a{
    display:block;
    padding:14px;
    color:white;
    text-decoration:none;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.dropdown a:hover{
    background:#1e293b;
}

/* ACTIVO */

.dropdown.active{
    display:block;
}

/* CONTENIDO */

main{
    padding:30px;
    position:relative;
}

/*  */

/*marca de agua */
.AlmeidaTech{
    position:fixed; /* o absolute */
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    z-index:0;
    opacity:0.09;
    pointer-events:none;
}

.AlmeidaTech img{
    width:600px;
    height:auto;
    display:block;
}


h1{
    font-size:40px;
    font-weight:normal;
}

h2{
    margin-top:10px;
    font-size:25px;
    font-weight:normal;
}

.panel{
    margin-top:20px;
    padding:20px;
    border:1px solid #ccc;
    max-width:900px;
}

</style>

</head>

<body>

<header>

    <div class="logo">
        <img src="logoclinicas.jpg" alt="Logo">
    </div>

    <div class="menu" onclick="toggleMenu()">
        ☰
    </div>

    <!-- menu de navegacion-->
    <div class="dropdown" id="dropdown">
        
        <a href="index.html"> Menu Principal</a>
        <a href="Administracion de documentos.html"> Administracion de documentos</a>
        <a href="formulariodetraslados.html"> Formulario de traslados</a>
        <a href="controldetraslados.html"> Gestion de traslados</a>
      
    </div>

</header>

<main>

   <div class="AlmeidaTech">
    <img src="AlmeidaTechPlateado.png" alt="AlmeidaTech">
</div>


    <h1>Panel de Administración</h1>
    <h2>Sistema hospitalario</h2>

    <div class="panel">
        Bienvenido al sistema de gestión.
    </div>

</main>

<script>
function toggleMenu(){
    document.getElementById("dropdown").classList.toggle("active");
}
</script>

</body>
</html>
