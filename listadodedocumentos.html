<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listado de Documentos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#ffffff;
}

.soporte{
    font-size:18px;
}

/* HEADER */

header{
    background:#ffffff;
    border-bottom:2px solid #2f9cff;
    height:65px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
}

.logo img{
    height:60px;
}

/* MARCA DE AGUA */

.AlmeidaTech{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    opacity:0.08;
    pointer-events:none;
    z-index:0;
}

.AlmeidaTech img{
    width:1000px;
}

/* CONTENIDO */

.container{
    padding:30px;
    position:relative;
    z-index:1;
}

h1{
    font-size:40px;
    font-weight:normal;
    margin-bottom:10px;
}

h2{
    font-size:24px;
    font-weight:normal;
    margin-bottom:20px;
    color:#444;
}

/* LISTADO */

.panel{
    max-width:900px;
    margin:auto;
    border:1px solid #cfcfcf;
    background:#f7f7f7;
    padding:15px;
}

.documento{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:white;
    border:1px solid #e0e0e0;
    margin-bottom:10px;
}

.documento span{
    font-size:16px;
}

.badge{
    font-size:13px;
    padding:4px 10px;
    border-radius:4px;
    background:#e3f2fd;
    color:#1976d2;
}

button{
    padding:8px 14px;
    border:none;
    background:#2f9cff;
    color:white;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#1f7fd6;
}

.version{
    position:fixed;
    bottom:10px;
    right:20px;
    color:#b8b8b8;
    font-size:16px;
}

</style>

</head>

<body>

<header>

    <div class="logo">
        <img src="logoclinicas.jpg" alt="Hospital de Clínicas">
    </div>
 
    <div class="soporte">
        Soporte Técnico ✉ AlmeidaTechUY@gmail.com
    </div>

</header>

<div class="AlmeidaTech">
    <img src="AlmeidaTechPlateado.png" alt="AlmeidaTech">
</div>

<div class="container">

    <h1>Documentos del Sistema</h1>
    <h2>Listado de PDFs de prueba</h2>

    <div class="panel">

        <div class="documento">
            <span>📄 Historia Clínica - Juan Pérez</span>
            <span class="badge">PDF</span>
            <button>Abrir</button>
        </div>

        <div class="documento">
            <span>📄 Informe de Traslado - DOC-001</span>
            <span class="badge">PDF</span>
            <button>Abrir</button>
        </div>

        <div class="documento">
            <span>📄 Resultado de Laboratorio - Sangre</span>
            <span class="badge">PDF</span>
            <button>Abrir</button>
        </div>

        <div class="documento">
            <span>📄 Registro de Ambulancia - Unidad 03</span>
            <span class="badge">PDF</span>
            <button>Abrir</button>
        </div>

        <div class="documento">
            <span>📄 Alta Médica - DOC-045</span>
            <span class="badge">PDF</span>
            <button>Abrir</button>
        </div>

    </div>

</div>

<div class="version">
    Pre-Alpha 0.1
</div>

</body>
</html>
